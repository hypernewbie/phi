<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Φ phi</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='glow' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='0%25' stop-color='%239a8dfa' /%3E%3Cstop offset='100%25' stop-color='%237c6af7' /%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23glow)'/%3E%3Ctext x='50%25' y='60%25' font-family='sans-serif' font-size='20' font-weight='bold' fill='%23ffffff' text-anchor='middle'%3EΦ%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="vendor/xterm.css">
    <link rel="stylesheet" href="vendor/highlight-github-dark.min.css">
    <script src="vendor/xterm.js"></script>
    <script src="vendor/xterm-addon-fit.js"></script>
    <script src="vendor/xterm-addon-webgl.js"></script>
    <script src="vendor/marked.min.js"></script>
    <script src="vendor/highlight.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="app-container">
        <!-- TOP BRAND BAR -->
        <header class="app-header">
            <div class="brand">
                <button id="mobile-sidebar-toggle" class="header-btn mobile-only-btn" title="Toggle Sessions Drawer" style="padding: 6px; border: none; background: transparent; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; margin-right: 4px;">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <span class="logo">Φ</span>
                <span class="brand-name">phi</span>
                <span id="hostname-display" class="hostname-display"></span>
            </div>
            
            <div class="workspace-area">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                <select id="workspace-select"></select>
                <button id="add-workspace-btn" title="Add Workspace">+</button>
                <button id="remove-workspace-btn" title="Remove Active Workspace">-</button>
            </div>

            <div class="header-actions">
                <div class="theme-area">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"></path></svg>
                    <select id="accent-color-select" title="Change Highlight Theme Color">
                        <option value="purple">Purple</option>
                        <option value="blue">Blue</option>
                        <option value="green">Green</option>
                        <option value="amber">Amber</option>
                        <option value="red">Red</option>
                        <option value="pink">Pink</option>
                        <option value="teal">Teal</option>
                        <option value="indigo">Indigo</option>
                        <option value="orange">Orange</option>
                        <option value="cyan">Cyan</option>
                        <option value="rose">Rose</option>
                        <option value="lime">Lime</option>
                    </select>
                </div>

                <button id="header-clipboard-btn" class="header-btn" title="Sync Remote Clipboard to Local Clipboard">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                    <span>Get Clipboard</span>
                </button>

                <button id="header-diff-toggle-btn" class="header-btn" title="Toggle Git Diff Panel">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                    <span>Diff</span>
                </button>
            </div>
        </header>

        <div class="main-layout">
            <!-- LEFT PANEL: SESSIONS -->
            <aside class="sidebar-panel" id="sidebar-panel">
                <div class="panel-header">
                    <h2>SESSIONS</h2>
                </div>
                
                <div class="coder-selector">
                    <button class="coder-tab active" data-coder="opencode" title="OpenCode">
                        <svg class="coder-logo" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M23.9 6.5l-2.7-2.3c-.3-.3-.8-.3-1.1 0L12 11.3 5.4 6c-.3-.3-.8-.3-1.1 0L.1 9c-.2.2-.2.6 0 .8L4.2 13 .1 16.2c-.2.2-.2.6 0 .8l4.2 3.2c.3.3.8.3 1.1 0l6.6-5.3 8.1 7.1c.3.3.8.3 1.1 0l2.7-2.3c.2-.2.2-.6 0-.8L18.4 13l5.5-5.7c.2-.2.2-.6 0-.8z"/>
                        </svg>
                        <span>OpenCode</span>
                    </button>
                    <button class="coder-tab" data-coder="claude" title="Claude Code">
                        <svg class="coder-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="4" fill="currentColor" opacity="0.15"></circle>
                            <path d="M12 2v4M12 18v4M2 12h4M18 12h4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                        </svg>
                        <span>Claude</span>
                    </button>
                    <button class="coder-tab" data-coder="agy" title="Antigravity / Agy">
                        <svg class="coder-logo" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2c0 5.523 4.477 10 10 10-5.523 0-10 4.477-10 10 0-5.523-4.477-10-10-10 5.477 0 10-4.477 10-10z"/>
                            <path d="M19 16c0 1.657 1.343 3 3 3-1.657 0-3 1.343-3 3 0-1.657-1.343-3-3-3 1.657 0 3-1.343 3-3z" opacity="0.7"/>
                        </svg>
                        <span>Agy</span>
                    </button>
                    <button class="coder-tab" data-coder="pi" title="Pi Coder">
                        <svg class="coder-logo" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M4 5v2h3v12h2V7h6v12h2V7h3V5H4z"/>
                        </svg>
                        <span>Pi</span>
                    </button>
                    <button class="coder-tab" data-coder="bash" title="Shell Prompt">
                        <svg class="coder-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="3" width="20" height="18" rx="2" ry="2" fill="currentColor" opacity="0.15"></rect>
                            <path d="M7 8l5 4-5 4M13 16h4"/>
                        </svg>
                        <span>Shell</span>
                    </button>
                </div>

                <div class="session-list-container">
                    <div id="session-list" class="session-list"></div>
                </div>

                <div class="panel-footer">
                    <button id="new-session-btn" class="btn btn-primary">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        New Session
                    </button>
                </div>
            </aside>

            <!-- LEFT RESIZE HANDLE -->
            <div class="resize-handle" id="left-resize-handle"></div>

            <!-- MIDDLE PANEL: TABS & TERMINAL -->
            <main class="terminal-panel">
                <!-- TABS HEADER -->
                <div class="terminal-tabs-bar">
                    <div id="tabs-container" class="tabs-container"></div>
                    <button id="close-all-tabs-btn" class="close-all-tabs-btn" title="Close all active sessions">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                        </svg>
                        <span>Close All</span>
                    </button>
                </div>

                <!-- ACTIVE TERMINAL CONTAINER -->
                <div class="terminal-content">
                    <div id="terminals-wrapper" class="terminals-wrapper"></div>
                    
                    <div id="input-bar-container" class="input-bar-container hidden">
                        <textarea id="input-textarea" placeholder="Type a prompt, Enter to send..."></textarea>
                        <div class="input-actions">
                            <button id="direct-mode-toggle" title="Toggle Direct Input Mode (Direct keyboard input vs staged text bar)" class="direct-mode-btn">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><line x1="6" y1="8" x2="6.01" y2="8"></line><line x1="10" y1="8" x2="10.01" y2="8"></line><line x1="14" y1="8" x2="14.01" y2="8"></line><line x1="18" y1="8" x2="18.01" y2="8"></line><line x1="6" y1="12" x2="6.01" y2="12"></line><line x1="18" y1="12" x2="18.01" y2="12"></line><line x1="7" y1="16" x2="17" y2="16"></line></svg>
                            </button>
                            <button id="copy-input-btn" class="direct-mode-btn" title="Copy context / Send /copy command">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                            </button>
                            <button id="send-input-btn" class="btn btn-accent">Send ↵</button>
                            <button id="cancel-input-btn" class="direct-mode-btn cancel-btn-icon" title="Interrupt/Cancel active command execution (Ctrl+C)">✕</button>
                        </div>
                    </div>
                    
                    <div id="presets-container" class="presets-container hidden"></div>
                    
                    <!-- Floating Drop-up for Model Presets -->
                    <div id="model-presets-dropup" class="model-presets-dropup hidden"></div>
                    <!-- Floating Drop-up for Quick Commands -->
                    <div id="quick-commands-dropup" class="model-presets-dropup hidden"></div>
                </div>
            </main>

            <!-- RIGHT RESIZE HANDLE -->
            <div class="resize-handle" id="right-resize-handle"></div>

            <!-- RIGHT PANEL: GIT DIFF -->
            <aside class="diff-panel" id="diff-panel">
                <div class="panel-header diff-header">
                    <div class="diff-tabs">
                        <button class="diff-tab-btn" data-tab="diff">diff</button>
                        <button class="diff-tab-btn active" data-tab="log">log</button>
                        <button class="diff-tab-btn" data-tab="status">status</button>
                        <button class="diff-tab-btn" data-tab="markdown">md</button>
                    </div>
                    <div class="diff-actions">
                        <button id="refresh-diff-btn" title="Refresh">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                        </button>
                        <button id="close-diff-btn" title="Hide Diff Panel">×</button>
                    </div>
                </div>

                <div class="diff-content">
                    <div id="diff-term-container" class="diff-term-container"></div>
                    <div id="markdown-file-list" class="markdown-file-list hidden"></div>
                </div>
            </aside>
        </div>
    </div>

    <!-- WORKSPACE MODAL DIALOG -->
    <div id="ws-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Workspace</h3>
                <button id="ws-modal-close" class="modal-close-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="input-autocomplete-wrapper">
                    <input type="text" id="ws-modal-input" placeholder="Type absolute path... (e.g., /home/user/code)" autocomplete="off">
                    <div id="ws-modal-suggestions" class="autocomplete-suggestions hidden"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="ws-modal-cancel-btn" class="btn btn-primary">Cancel</button>
                <button id="ws-modal-add-btn" class="btn btn-accent">Add Workspace</button>
            </div>
        </div>
    </div>

    <!-- Markdown Viewer Modal -->
    <div id="md-modal" class="md-modal-overlay hidden">
        <div class="md-modal-content">
            <div class="md-modal-header">
                <span id="md-modal-title" class="md-modal-title"></span>
                <button id="md-modal-close" class="md-modal-close">×</button>
            </div>
            <div id="md-modal-body" class="md-modal-body"></div>
        </div>
    </div>

    <!-- Main Entry Point -->
    <script type="module" src="app.js"></script>
</body>
</html>
